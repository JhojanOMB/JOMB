<!DOCTYPE html>
<html lang="es">

<head>
  <!-- 1. Metadatos esenciales -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- 2. SEO básico -->
  <title>Desarrollo de Páginas Web | Creamos tu Web Profesional – JOMB</title>
  <meta 
    name="description" 
    content="JOMB desarrolla tu página web profesional. Creamos sitios web personalizados, optimizados para SEO y adaptados a móviles. ¡Solicita tu web hoy!" 
  />
  <meta 
    name="keywords" 
    content="crear página web, desarrollo web, diseñar web, páginas web profesionales, SEO, Bootstrap, Django" 
  />

  <!-- Mejora performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Fonts: Onest + Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- Favicons -->
  <link rel="icon" href="./img/JOMB.png" type="image/png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./img/apple-touch-icon.png" />

  <!-- CSS local -->
  <link rel="stylesheet" href="./css/fuentes.css" />
  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="stylesheet" href="./css/iconos.css" />

  <!-- Script de tema: ejecutar inmediatamente para evitar flash -->
  <script>
    const temaGuardado = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-bs-theme', temaGuardado);
  </script>

  <!-- JSON-LD para Google -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "JOMB",
    "url": "https://jhojanomb.github.io/JOMB/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://jhojanomb.github.io/JOMB/?s={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "JOMB",
    "url": "https://jhojanomb.github.io/JOMB/",
    "logo": "https://jhojanomb.github.io/JOMB/img/JOMB.png",
    "sameAs": [
      "https://github.com/jhojanomb",
      "https://linkedin.com/in/jhojanomb"
    ]
  }
  </script>

  <!-- CSS de terceros (defer si posible) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet" defer />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" defer />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" defer />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" defer />

  <!-- Frameworks de utilidad -->
  <script src="https://cdn.tailwindcss.com" defer></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script> <!-- Para modelos 3D -->

  <!-- Scripts locales: carga dinámica -->
  <script src="./js/contacto.js" defer></script>
  <script src="./js/carga.js" defer></script>
  <script src="./js/tema.js" defer></script>
  <script src="./js/top.js" defer></script>
  <script src="./js/3D.js" defer></script>

  <!-- Librerías que necesitan inicializarse pronto -->
  <!-- WOW.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" defer></script>
</head>

<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 bg-gradient-to-r from-black to-purple-900 shadow-lg text-white">
    <div class="max-w-7xl mx-auto relative flex items-center justify-between px-6 py-4">
      <!-- Logo -->
      <a href="#" onclick="cargarContenido('paginas/inicio.html')" class="flex items-center space-x-3 z-10">
        <img src="./img/JOMB.ico" alt="JOMB Logo" class="w-10 h-10" />
        <span class="text-2xl font-semibold">JOMB</span>
      </a>

      <!-- Enlaces de escritorio centrados -->
      <ul class="hidden lg:flex absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 space-x-8">
        <li class="relative group">
          <a href="#"
             onclick="cargarContenido('paginas/inicio.html')"
             class="text-white hover:text-purple-300 transition"
          >Inicio</a>
          <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-purple-400 transition-all duration-300 group-hover:w-full"></span>
        </li>
        <li class="relative group">
          <a href="#"
             onclick="cargarContenido('paginas/sobre_nosotros.html')"
             class="text-white hover:text-purple-300 transition"
          >Sobre Nosotros</a>
          <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-purple-400 transition-all duration-300 group-hover:w-full"></span>
        </li>
        <li class="relative group">
          <a href="#"
             onclick="cargarContenido('paginas/servicios.html')"
             class="text-white hover:text-purple-300 transition"
          >Servicios</a>
          <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-purple-400 transition-all duration-300 group-hover:w-full"></span>
        </li>
        <li class="relative group">
          <a href="#"
             onclick="cargarContenido('paginas/portafolio.html')"
             class="text-white hover:text-purple-300 transition"
          >Portafolio</a>
          <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-purple-400 transition-all duration-300 group-hover:w-full"></span>
        </li>
        <li class="relative group">
          <a href="#"
             onclick="cargarContenido('paginas/contacto.html')"
             class="text-white hover:text-purple-300 transition"
          >Contacto</a>
          <span class="absolute left-0 -bottom-1 h-0.5 w-0 bg-purple-400 transition-all duration-300 group-hover:w-full"></span>
        </li>
      </ul>

      <!-- Botón Toggle Tema -->
      <button id="toggle-theme" class="p-2 text-white hover:text-purple-300 transition focus:outline-none z-10 hidden lg:block">
        <i class="bi bi-moon-fill text-xl"></i>
      </button>

      <!-- Botón móvil -->
      <button id="menu-btn" class="lg:hidden p-2 text-white focus:outline-none z-10">
        <i class="fas fa-bars text-2xl"></i>
      </button>
    </div>

    <!-- Drawer lateral móvil -->
    <div 
      id="mobile-menu" 
      class="fixed inset-0 bg-black bg-opacity-75 transform -translate-x-full transition-transform lg:hidden z-40"
    >
      <div class="absolute top-0 left-0 w-72 h-full bg-gradient-to-b from-purple-950 via-purple-900 to-black p-0 shadow-2xl flex flex-col">
        <!-- Header del menú -->
        <div class="bg-gradient-to-r from-purple-900 to-purple-800 px-6 py-8 border-b-2 border-purple-700">
          <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
              <img src="./img/JOMB.ico" alt="JOMB Logo" class="w-8 h-8" />
              <span class="text-2xl font-bold text-white">Menú</span>
            </div>
            <button id="menu-close" class="p-2 text-white hover:bg-purple-700 rounded-lg transition-all duration-300 focus:outline-none">
              <i class="fas fa-times text-2xl"></i>
            </button>
          </div>
        </div>

        <!-- Contenedor de enlaces con scroll -->
        <ul class="flex flex-col flex-1 overflow-y-auto px-4 py-6 space-y-3">
          <li>
            <a href="#" onclick="cargarContenido('paginas/inicio.html'); toggleDrawer()" 
               class="flex items-center space-x-4 px-4 py-3 rounded-lg text-white text-lg font-medium transition-all duration-300 hover:bg-purple-800 hover:translate-x-2 group">
              <i class="fas fa-home text-purple-400 group-hover:text-purple-300 text-xl"></i>
              <span>Inicio</span>
            </a>
          </li>
          <li>
            <a href="#" onclick="cargarContenido('paginas/sobre_nosotros.html'); toggleDrawer()" 
               class="flex items-center space-x-4 px-4 py-3 rounded-lg text-white text-lg font-medium transition-all duration-300 hover:bg-purple-800 hover:translate-x-2 group">
              <i class="fas fa-user text-purple-400 group-hover:text-purple-300 text-xl"></i>
              <span>Sobre Nosotros</span>
            </a>
          </li>
          <li>
            <a href="#" onclick="cargarContenido('paginas/servicios.html'); toggleDrawer()" 
               class="flex items-center space-x-4 px-4 py-3 rounded-lg text-white text-lg font-medium transition-all duration-300 hover:bg-purple-800 hover:translate-x-2 group">
              <i class="fas fa-cogs text-purple-400 group-hover:text-purple-300 text-xl"></i>
              <span>Servicios</span>
            </a>
          </li>
          <li>
            <a href="#" onclick="cargarContenido('paginas/portafolio.html'); toggleDrawer()" 
               class="flex items-center space-x-4 px-4 py-3 rounded-lg text-white text-lg font-medium transition-all duration-300 hover:bg-purple-800 hover:translate-x-2 group">
              <i class="fas fa-briefcase text-purple-400 group-hover:text-purple-300 text-xl"></i>
              <span>Portafolio</span>
            </a>
          </li>
          <li>
            <a href="#" onclick="cargarContenido('paginas/contacto.html'); toggleDrawer()" 
               class="flex items-center space-x-4 px-4 py-3 rounded-lg text-white text-lg font-medium transition-all duration-300 hover:bg-purple-800 hover:translate-x-2 group">
              <i class="fas fa-envelope text-purple-400 group-hover:text-purple-300 text-xl"></i>
              <span>Contacto</span>
            </a>
          </li>
        </ul>

        <!-- Footer del menú -->
        <div class="border-t-2 border-purple-700 px-6 py-4 bg-gradient-to-t from-purple-950 to-transparent">
          <p class="text-purple-300 text-sm text-center">© 2026 JOMB</p>
        </div>
      </div>
    </div>

    <script>
      const menuBtn   = document.getElementById('menu-btn');
      const mobileNav = document.getElementById('mobile-menu');
      const closeBtn  = document.getElementById('menu-close');

      function toggleDrawer() {
        mobileNav.classList.toggle('-translate-x-full');
      }

      menuBtn.addEventListener('click', toggleDrawer);
      closeBtn.addEventListener('click', toggleDrawer);
    </script>
  </nav>

  <!-- Contenido dinámico -->
  <main id="content" class="font-custom"></main>

  <!-- Botón Volver Arriba -->
  <button id="back-to-top"
          aria-label="Volver al inicio"
          class="fixed bottom-6 right-6 p-4 w-14 h-14 rounded-full bg-purple-800 text-white btn-neumorph">
    <i class="fas fa-arrow-up"></i>
  </button>
  
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@latest/bundled/lenis.min.js"></script>
  <script>
    const lenis = new Lenis({
      duration: 1.2,  // velocidad
      smooth: true
    })

    function raf(time) {
      lenis.raf(time)
      requestAnimationFrame(raf)
    }

    requestAnimationFrame(raf)
  </script>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>AOS.init({duration:800,once:true});</script>
  <script>new WOW({boxClass:'wow',animateClass:'animate__animated',offset:100,mobile:true,live:true}).init();</script>
</body>

</html>
