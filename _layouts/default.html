<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - JOMB</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="icon" href="/img/JOMB.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Cargamos la librería de Particles.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <meta name="google-site-verification" content="oAh0fdncGo8SF5BI0N2HSTewI1COvk-3aCcWiwzsyRc">
    <meta name="description" content="Servicios de tecnología, desarrollo de páginas web.">
    <meta property="og:title" content="JOMB - Servicios de Tecnología">
    <meta property="og:description" content="Ofrecemos instalación de cualquier versión de Windows, mejoras de rendimiento y más.">
    <meta property="og:image" content="/img/JOMB.png">
  </head>
  <body class="text-white">
    <!-- Incluye el navbar -->
    {% include navbar.html %}
    
    <!-- Contenedor de Particles.js -->
    <div id="particles-js"></div>
    
    <!-- Contenido principal -->
    <main class="px-3 px-lg-5">
      {{ content }}
    </main>
    
    <!-- Footer -->
    <footer class="text-white text-center py-3 border-secondary border-3 border-top">
      <p>&copy; 2025 JOMB. Todos los derechos reservados.</p>
    </footer>
    
    <!-- Incluye las redes sociales -->
    {% include redes.html %}
    
    <!-- Scripts -->
    <script src="/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Tu script de configuración para Particles.js (si lo tienes personalizado) -->
    <script src="/js/particulas.js"></script>
    <script>
      // Validación de formularios (Bootstrap)
      (() => {
          'use strict';
          const forms = document.querySelectorAll('.needs-validation');
          Array.from(forms).forEach(form => {
              form.addEventListener('submit', event => {
                  if (!form.checkValidity()) {
                      event.preventDefault();
                      event.stopPropagation();
                  }
                  form.classList.add('was-validated');
              }, false);
          });
      })();
    </script>
  </body>
</html>
